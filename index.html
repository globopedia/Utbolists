  const [y, m] = ym.split("-").map(Number);
  return y * 12 + m;

function limpiarNombreJugador(s) {
  if (!s) return "";
  return String(s)
    .replace(/\u00A0/g, " ")               // NBSP → espacio
    .replace(/^\s*\(?\d+\)?\s*/, "")       // quita "(48 " o "48)"
    .replace(/[.,;:)\s]+$/, "")            // quita .,;:) al final
    .replace(/^[\s(]+/, "")                // quita espacios o paréntesis al inicio
    .trim();
}
    
function obtenerMinutoIngreso(texto, futbolista) {
  const regex = new RegExp(`\\((\\d+(?:\\+\\d+)?)\\s*${futbolista}`, "i");
  const match = texto.match(regex);
  if (!match) return null;

  const m = match[1];
  return m.includes("+")
    ? m.split("+").map(Number).reduce((a,b)=>a+b)
    : Number(m);
}
function obtenerMinutoSalida(texto, futbolista) {
  const regex = new RegExp(
    `${futbolista}\\s*\\(\\s*(\\d+(?:\\+\\d+)?)\\s+[^()]+`,
    "i"
  );

  const match = texto.match(regex);
  if (!match) return null;

  const m = match[1];
  return m.includes("+")
    ? m.split("+").map(Number).reduce((a,b)=>a+b)
    : Number(m);
}
function getResumenRendimientoFutbolista(nombreFutbolista) {

      .replace(/[()]/g, ",")
      .replace(/\b\d+(?:\+\d+)?\s*/g, "")
      .replace(/\.+/g, "")
      .replace(/\s+y\s+/gi, ",")
      .replace(/\s+e\s+/gi, ",")
      .replace(/,,+/g, ",")
      .replace(/\s+,/g, ",")
      .replace(/,\s+/g, ",")
      .replace(/\s+/g, " ")
      .split(/[,;]+/)
      .map(j => j.trim())
      .filter(j => j.length > 1);

    return jugadores.some(j => norm(j) === norm(nombreFutbolista));
  });

  if (!delFutbolista.length) return "";

  const total = delFutbolista.length;
  const victorias = delFutbolista.filter(p => norm(p.Situación) === "victoria").length;
  const empates   = delFutbolista.filter(p => norm(p.Situación) === "empate").length;
  const derrotas  = delFutbolista.filter(p => norm(p.Situación) === "derrota").length;

  const efectividad = ((victorias * 3 + empates) * 100 / (total * 3)).toFixed(1);

  let color;
  if (efectividad < 30) color = "#e74c3c";
  else if (efectividad < 45) color = "#f1c40f";
  else color = "#2ecc71";

  const fechas = delFutbolista
    .map(p => {
      const [d, m, a] = p.Fecha.split("/");
      return new Date(`${a}-${m}-${d}`);
    })
    .sort((a,b) => a - b);

  const desde = fechas[0].getFullYear();
  const hasta = fechas[fechas.length - 1].getFullYear();

  return `
    <div style="margin-bottom:10px;">
    <!-- <div>${total} ${total === 1 ? "partido" : "partidos"} (${desde}-${hasta})</div> -->
      <div>
        <span style="
          background:${color};
          color:white;
          padding:4px 8px;
          border-radius:6px;
          font-weight:bold;
          font-size:15px;
        ">
          ${efectividad}%</span>
        <span>de efectividad</span>
      </div>
    </div>
  `;
}

  function InvertirNombre(nombre) {
  const partes = nombre.trim().split(" ");
  if (partes.length < 2) return nombre;

  if (partes.length === 2) {
    // Caso simple: Nombre + Apellido
    const [nombre1, apellido] = partes;
    return apellido + ", " + nombre1;
  }

  // Lista de conectores/apellidos compuestos en minúscula
  const conectores = ["de", "del", "de la", "de los", "la", "las", "los", "san", "santa"];

  // Unir las últimas palabras y ver si forman parte de un apellido compuesto
  let i = partes.length - 1;
  let apellido = partes[i];
  while (i > 0) {
    const posible = partes[i - 1].toLowerCase();
    if (conectores.includes(posible)) {
      apellido = partes[i - 1] + " " + apellido;
      i--;
    } else {
      break;
    }
  }

  const nombres = partes.slice(0, i).join(" ");
  return apellido + ", " + nombres;
}

let debounceTimer;

function debounce(func, delay) {
  return function(...args) {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => func.apply(this, args), delay);
  };
}

  // --- Navegación con teclado en el autocompletado --- //
let selectedIndex = -1;

searchInput.addEventListener("keydown", function(e) {
  const items = suggestionsList.querySelectorAll("li");
  if (!items.length) return;

  if (e.key === "ArrowDown") {
    e.preventDefault();
    selectedIndex = (selectedIndex + 1) % items.length;
    actualizarSeleccion(items);
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    selectedIndex = (selectedIndex - 1 + items.length) % items.length;
    actualizarSeleccion(items);
  } else if (e.key === "Enter") {
    e.preventDefault();
    if (selectedIndex >= 0 && selectedIndex < items.length) {
      items[selectedIndex].click();
    }
  } else {
    selectedIndex = -1; // reset si escribe algo nuevo
  }
});

function actualizarSeleccion(items) {
  items.forEach((item, i) => {
    const activo = i === selectedIndex;
    item.style.background = activo ? "#ffdddd" : "white";
    if (activo) {
      // 👉 Mostrar texto completo en el input (typeahead visual)
      const texto = item.textContent.trim();
      searchInput.value = texto;
    }
  });

  // desplazamiento automático si el ítem está fuera de vista
  const selectedItem = items[selectedIndex];
  if (selectedItem) {
    const containerTop = suggestionsList.scrollTop;
    const containerBottom = containerTop + suggestionsList.offsetHeight;
    const itemTop = selectedItem.offsetTop;
    const itemBottom = itemTop + selectedItem.offsetHeight;
    if (itemTop < containerTop) {
      suggestionsList.scrollTop = itemTop;
    } else if (itemBottom > containerBottom) {
      suggestionsList.scrollTop = itemBottom - suggestionsList.offsetHeight;
    }
  }
}
// --- Cerrar autocompletado con ESC --- //
searchInput.addEventListener("keydown", function(e) {

});

  const esClickEnLista = suggestionsList.contains(e.target);
  if (!esClickEnInput && !esClickEnLista) {
    suggestionsList.innerHTML = "";
    selectedIndex = -1;

});
// --- Reabrir sugerencias si el input tiene texto y se hace clic --- //
searchInput.addEventListener("focus", function(e) {

});
